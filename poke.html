<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d1a;
            --card-bg: #13131f;
            --surface: #1a1a2e;
            --border: rgba(255,255,255,0.07);
            --accent: #f5c518;
            --accent2: #e85d04;
            --text: #f0f0f0;
            --muted: #888;
            --glow: rgba(245, 197, 24, 0.25);

            --fire: #e85d04;
            --water: #0096c7;
            --grass: #52b788;
            --electric: #ffd60a;
            --psychic: #f72585;
            --ice: #90e0ef;
            --dragon: #7b2d8b;
            --dark: #343a40;
            --fairy: #ff85a1;
            --normal: #adb5bd;
            --fighting: #d00000;
            --flying: #48cae4;
            --poison: #9d4edd;
            --ground: #d4a373;
            --rock: #6d6875;
            --bug: #80b918;
            --ghost: #5c4a7c;
            --steel: #4cc9f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px;
            overflow-x: hidden;
        }

        /* Starfield background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 45%, rgba(255,255,255,0.15) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,0.25) 0%, transparent 100%),
                radial-gradient(1px 1px at 20% 85%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(2px 2px at 45% 90%, rgba(245,197,24,0.2) 0%, transparent 100%),
                radial-gradient(2px 2px at 75% 30%, rgba(232,93,4,0.15) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        header h1 {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(1.2rem, 4vw, 2rem);
            color: var(--accent);
            text-shadow: 0 0 30px var(--glow), 0 0 60px rgba(245,197,24,0.1);
            letter-spacing: 2px;
        }

        header p {
            color: var(--muted);
            font-size: 0.95rem;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
            margin-bottom: 48px;
        }

        .search-bar input {
            flex: 1;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 14px 20px;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-bar input::placeholder { color: var(--muted); }

        .search-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--glow);
        }

        .search-bar button {
            background: var(--accent);
            border: none;
            border-radius: 12px;
            padding: 14px 22px;
            color: #000;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.6rem;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            white-space: nowrap;
        }

        .search-bar button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245,197,24,0.4);
        }

        .search-bar button:active { transform: translateY(0); }

        /* Loader */
        .loader {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            position: relative;
            z-index: 1;
        }

        .loader.active { display: flex; }

        .pokeball-spin {
            width: 52px; height: 52px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: var(--accent);
            border-right-color: var(--accent2);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader p {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.55rem;
            color: var(--muted);
            animation: blink 1s steps(1) infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Error */
        .error-box {
            display: none;
            background: rgba(208,0,0,0.12);
            border: 1.5px solid rgba(208,0,0,0.4);
            border-radius: 12px;
            padding: 16px 28px;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: fadeIn 0.3s ease;
        }

        .error-box.active { display: block; }

        .error-box p {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.6rem;
            color: #ff6b6b;
            line-height: 1.8;
        }

        /* Card */
        .card {
            display: none;
            width: 100%;
            max-width: 680px;
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: slideUp 0.45s cubic-bezier(0.16,1,0.3,1);
        }

        .card.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* Card header band */
        .card-header {
            position: relative;
            padding: 36px 36px 0;
            display: flex;
            gap: 24px;
            align-items: flex-end;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 140px;
            border-radius: 22px 22px 0 0;
            opacity: 0.12;
            transition: background 0.4s;
        }

        .sprite-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .sprite-wrap::before {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--type-color, var(--accent)), transparent 70%);
            opacity: 0.25;
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.25; }
            50%       { transform: scale(1.08); opacity: 0.4; }
        }

        .sprite-wrap img {
            width: 130px;
            height: 130px;
            image-rendering: pixelated;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-8px); }
        }

        .card-title {
            padding-bottom: 8px;
        }

        .card-title .number {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .card-title h2 {
            font-size: 2rem;
            font-weight: 900;
            text-transform: capitalize;
            letter-spacing: 1px;
            line-height: 1;
        }

        .types {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .type-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
        }

        /* Card body */
        .card-body {
            padding: 28px 36px 36px;
        }

        /* Info row */
        .info-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }

        .info-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 12px;
            text-align: center;
        }

        .info-item .label {
            font-size: 0.65rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }

        .info-item .value {
            font-size: 1.05rem;
            font-weight: 900;
            text-transform: capitalize;
        }

        /* Abilities */
        .section-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.55rem;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .abilities {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 28px;
        }

        .ability-badge {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: capitalize;
        }

        .ability-badge.hidden {
            border-color: var(--accent2);
            color: var(--accent2);
        }

        /* Stats */
        .stats { display: flex; flex-direction: column; gap: 10px; }

        .stat-row {
            display: grid;
            grid-template-columns: 110px 1fr 42px;
            align-items: center;
            gap: 14px;
        }

        .stat-name {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: right;
        }

        .stat-bar-bg {
            height: 8px;
            background: var(--surface);
            border-radius: 99px;
            overflow: hidden;
        }

        .stat-bar {
            height: 100%;
            border-radius: 99px;
            width: 0%;
            transition: width 1s cubic-bezier(0.16,1,0.3,1);
        }

        .stat-value {
            font-size: 0.9rem;
            font-weight: 900;
            text-align: right;
        }

        /* Flavor text */
        .flavor {
            margin-top: 28px;
            padding: 16px 20px;
            background: var(--surface);
            border-left: 3px solid var(--accent);
            border-radius: 0 10px 10px 0;
            font-size: 0.88rem;
            color: #ccc;
            line-height: 1.6;
            font-style: italic;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #ff6b6b;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.55rem;
            padding: 12px 22px;
            border-radius: 10px;
            z-index: 999;
            transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Responsive */
        @media (max-width: 500px) {
            .card-header { flex-direction: column; align-items: center; text-align: center; padding: 28px 24px 0; }
            .card-body { padding: 22px 24px 30px; }
            .info-row { grid-template-columns: repeat(2, 1fr); }
            .stat-row { grid-template-columns: 90px 1fr 36px; }
            .types { justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <h1>POKÉDEX</h1>
        <p>Search any Pokémon by name or number</p>
    </header>

    <div class="search-bar">
        <input type="text" id="pokemonInput" placeholder="e.g. pikachu, charizard…" autocomplete="off">
        <button onclick="fetchPokemon()">GO!</button>
    </div>

    <div class="loader" id="loader">
        <div class="pokeball-spin"></div>
        <p>LOADING...</p>
    </div>

    <div class="error-box" id="errorBox">
        <p id="errorMsg">POKEMON NOT FOUND!</p>
    </div>

    <div class="card" id="card">
        <div class="card-header" id="cardHeader">
            <div class="sprite-wrap">
                <img id="sprite" src="" alt="sprite">
            </div>
            <div class="card-title">
                <div class="number" id="pokeNumber">#001</div>
                <h2 id="pokeName">Bulbasaur</h2>
                <div class="types" id="types"></div>
            </div>
        </div>

        <div class="card-body">
            <div class="info-row" id="infoRow"></div>

            <p class="section-title">Abilities</p>
            <div class="abilities" id="abilities"></div>

            <div class="divider"></div>

            <p class="section-title">Base Stats</p>
            <div class="stats" id="stats"></div>

            <div class="flavor" id="flavor"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const TYPE_COLORS = {
            fire:'#e85d04', water:'#0096c7', grass:'#52b788', electric:'#ffd60a',
            psychic:'#f72585', ice:'#90e0ef', dragon:'#7b2d8b', dark:'#343a40',
            fairy:'#ff85a1', normal:'#7b7b7b', fighting:'#d00000', flying:'#48cae4',
            poison:'#9d4edd', ground:'#d4a373', rock:'#6d6875', bug:'#80b918',
            ghost:'#5c4a7c', steel:'#4cc9f0'
        };

        const STAT_COLORS = {
            hp:'#ff5252', attack:'#ff7043', defense:'#42a5f5',
            'special-attack':'#ab47bc', 'special-defense':'#26a69a', speed:'#ffca28'
        };

        const STAT_LABELS = {
            hp:'HP', attack:'Attack', defense:'Defense',
            'special-attack':'Sp. Atk', 'special-defense':'Sp. Def', speed:'Speed'
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2800);
        }

        function setLoading(on) {
            document.getElementById('loader').classList.toggle('active', on);
        }

        function setError(msg) {
            const box = document.getElementById('errorBox');
            document.getElementById('errorMsg').textContent = msg;
            box.classList.add('active');
        }

        function clearUI() {
            document.getElementById('errorBox').classList.remove('active');
            document.getElementById('card').classList.remove('active');
        }

        async function fetchPokemon() {
            const input = document.getElementById('pokemonInput').value.trim().toLowerCase();
            if (!input) { showToast('Enter a Pokémon name!'); return; }

            clearUI();
            setLoading(true);

            try {
                const [pokeRes, speciesRes] = await Promise.all([
                    fetch(`https://pokeapi.co/api/v2/pokemon/${input}`),
                    fetch(`https://pokeapi.co/api/v2/pokemon-species/${input}`)
                ]);

                if (!pokeRes.ok) throw new Error('NOT FOUND');

                const data = await pokeRes.json();
                const species = speciesRes.ok ? await speciesRes.json() : null;

                renderCard(data, species);

            } catch (e) {
                setError(`"${input}" NOT FOUND!\nCheck the spelling and try again.`);
            } finally {
                setLoading(false);
            }
        }

        function renderCard(data, species) {
            const types = data.types.map(t => t.type.name);
            const primaryType = types[0];
            const typeColor = TYPE_COLORS[primaryType] || '#888';

            // Header tint
            const header = document.getElementById('cardHeader');
            header.style.setProperty('--type-color', typeColor);
            header.querySelector('::before');
            document.querySelector('.card-header::before');
            header.style.background = `linear-gradient(160deg, ${typeColor}18 0%, transparent 60%)`;

            // Sprite
            const sprite = data.sprites.other['official-artwork']?.front_default
                          || data.sprites.front_default;
            document.getElementById('sprite').src = sprite;
            document.querySelector('.sprite-wrap').style.setProperty('--type-color', typeColor);

            // Name + number
            document.getElementById('pokeNumber').textContent = `#${String(data.id).padStart(3,'0')}`;
            document.getElementById('pokeName').textContent = data.name;
            document.title = `${data.name.charAt(0).toUpperCase() + data.name.slice(1)} — Pokédex`;

            // Types
            const typesEl = document.getElementById('types');
            typesEl.innerHTML = types.map(t => {
                const c = TYPE_COLORS[t] || '#888';
                return `<span class="type-badge" style="background:${c}${t==='electric'||t==='ice'?';color:#000':''}">${t}</span>`;
            }).join('');

            // Info row
            const genus = species?.genera?.find(g => g.language.name === 'en')?.genus || '—';
            document.getElementById('infoRow').innerHTML = `
                <div class="info-item">
                    <div class="label">Height</div>
                    <div class="value">${(data.height / 10).toFixed(1)} m</div>
                </div>
                <div class="info-item">
                    <div class="label">Weight</div>
                    <div class="value">${(data.weight / 10).toFixed(1)} kg</div>
                </div>
                <div class="info-item">
                    <div class="label">Category</div>
                    <div class="value" style="font-size:0.85rem">${genus}</div>
                </div>
            `;

            // Abilities
            document.getElementById('abilities').innerHTML = data.abilities.map(a =>
                `<span class="ability-badge ${a.is_hidden ? 'hidden' : ''}">${a.ability.name.replace('-',' ')}${a.is_hidden ? ' ✦' : ''}</span>`
            ).join('');

            // Stats
            const statsEl = document.getElementById('stats');
            statsEl.innerHTML = data.stats.map(s => {
                const name = s.stat.name;
                const val = s.base_stat;
                const pct = Math.min(100, (val / 255) * 100);
                const color = STAT_COLORS[name] || typeColor;
                return `
                    <div class="stat-row">
                        <span class="stat-name">${STAT_LABELS[name] || name}</span>
                        <div class="stat-bar-bg">
                            <div class="stat-bar" data-pct="${pct}" style="background:${color}"></div>
                        </div>
                        <span class="stat-value">${val}</span>
                    </div>`;
            }).join('');

            // Flavor text
            const flavorEntry = species?.flavor_text_entries
                ?.find(f => f.language.name === 'en');
            const flavorText = flavorEntry
                ? flavorEntry.flavor_text.replace(/\f/g, ' ')
                : '';
            const flavorEl = document.getElementById('flavor');
            flavorEl.textContent = flavorText;
            flavorEl.style.display = flavorText ? 'block' : 'none';
            flavorEl.style.borderColor = typeColor;

            // Show card
            document.getElementById('card').classList.add('active');

            // Animate stat bars
            requestAnimationFrame(() => {
                document.querySelectorAll('.stat-bar').forEach(bar => {
                    bar.style.width = bar.dataset.pct + '%';
                });
            });
        }

        // Enter key support
        document.getElementById('pokemonInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') fetchPokemon();
        });
    </script>
</body>
</html>
